<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Midnight</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --panel: #0a0a0a; --text: #ededed; --muted: #888; --border: #222; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--panel); border: 1px solid var(--border); width: 100%; max-width: 380px; padding: 40px; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        h2 { margin: 0 0 8px 0; font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; }
        p.subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
        input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; font-family: inherit; font-size: 0.95rem; box-sizing: border-box; outline: none; transition: 0.2s; }
        input:focus { border-color: #555; }
        input[type="file"]::file-selector-button { background: #222; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-right: 10px; font-size: 0.8rem; }
        .btn-submit { width: 100%; background: #fff; color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-submit:hover { background: #e5e5e5; }
        .footer-link { display: block; text-align: center; margin-top: 24px; color: var(--muted); text-decoration: none; font-size: 0.85rem; }
        .footer-link:hover { color: #fff; }
        .alert { padding: 10px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 20px; display: none; }
        .alert-error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .alert-success { background: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.2); }
    </style>
</head>
<body>
    <div class="auth-box">
        <h2>Register Node</h2>
        <p class="subtitle">Create a new local identity.</p>
        <div id="statusMsg" class="alert"></div>
        <form id="registerForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="john_doe" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" id="address" placeholder="City, Region" required>
            </div>
            <div class="form-group">
                <label>Avatar (Max 2MB)</label>
                <input type="file" id="profile_pic" accept="image/*" required>
            </div>
            <button type="submit" class="btn-submit">Complete Registration</button>
        </form>
        <a href="login.html" class="footer-link">Already registered? Sign in →</a>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const u = document.getElementById('username').value, p = document.getElementById('password').value;
            const a = document.getElementById('address').value, f = document.getElementById('profile_pic').files[0];
            const msg = document.getElementById('statusMsg');

            if (f.size > 2 * 1024 * 1024) {
                msg.className = 'alert alert-error'; msg.style.display = 'block'; msg.innerText = "File exceeds 2MB limit."; return;
            }

            const reader = new FileReader();
            reader.onload = function(evt) {
                localStorage.setItem('user_' + u, JSON.stringify({ username: u, password: p, address: a, profilePic: evt.target.result }));
                msg.className = 'alert alert-success'; msg.style.display = 'block'; msg.innerHTML = "Success. <a href='login.html' style='color:#fff;'>Login here</a>";
                document.getElementById('registerForm').reset();
            };
            reader.readAsDataURL(f);
        });
    </script>
</body>
</html>
