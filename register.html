<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Midnight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #fff; min-height: 100vh; padding: 40px 20px; }
        .dark-card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 40px; width: 100%; max-width: 800px; margin: auto; position: relative; }
        .dark-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(to right, #a855f7, #38bdf8); border-radius: 16px 16px 0 0; }
        .section-title { color: #38bdf8; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin: 25px 0 15px 0; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .form-control, .form-select { background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
        .form-control:focus { background: #1a1a1a; border-color: #a855f7; color: #fff; box-shadow: none; }
        label { color: #9ca3af; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .btn-submit { background: #fff; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: 700; width: 100%; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="dark-card">
        <h2 class="text-center fw-bold mb-4">Create Identity</h2>
        <form id="registerForm">
            <div class="section-title">System Credentials</div>
            <div class="row">
                <div class="col-md-6"><label>Username</label><input type="text" id="username" class="form-control" required></div>
                <div class="col-md-6"><label>Password</label><input type="password" id="password" class="form-control" required></div>
            </div>

            <div class="section-title">Personal Information</div>
            <div class="row">
                <div class="col-md-8"><label>Full Name</label><input type="text" id="fullname" class="form-control" required></div>
                <div class="col-md-4"><label>Age</label><input type="number" id="age" class="form-control" required></div>
                <div class="col-md-4"><label>Date of Birth</label><input type="date" id="dob" class="form-control" required></div>
                <div class="col-md-4"><label>Sex</label>
                    <select id="sex" class="form-select"><option value="Male">Male</option><option value="Female">Female</option></select>
                </div>
                <div class="col-md-4"><label>Civil Status</label><input type="text" id="civilStatus" class="form-control" placeholder="Single/Married"></div>
                <div class="col-md-6"><label>Place of Birth</label><input type="text" id="pob" class="form-control" required></div>
                <div class="col-md-6"><label>Home Address</label><input type="text" id="address" class="form-control" required></div>
            </div>

            <div class="section-title">Contact Information</div>
            <div class="row">
                <div class="col-md-6"><label>Phone Number</label><input type="text" id="phone" class="form-control" required></div>
                <div class="col-md-6"><label>Email Address</label><input type="email" id="email" class="form-control" required></div>
            </div>

            <div class="section-title">Educational Background</div>
            <div class="row">
                <div class="col-md-9"><label>Elementary</label><input type="text" id="elem" class="form-control"></div>
                <div class="col-md-3"><label>Year Completed</label><input type="text" id="elemYear" class="form-control"></div>
                <div class="col-md-9"><label>Junior High School</label><input type="text" id="jhs" class="form-control"></div>
                <div class="col-md-3"><label>Year Completed</label><input type="text" id="jhsYear" class="form-control"></div>
                <div class="col-md-9"><label>Senior High School</label><input type="text" id="shs" class="form-control"></div>
                <div class="col-md-3"><label>Year Completed</label><input type="text" id="shsYear" class="form-control"></div>
                <div class="col-md-6"><label>College</label><input type="text" id="college" class="form-control"></div>
                <div class="col-md-6"><label>Course</label><input type="text" id="course" class="form-control"></div>
            </div>

            <div class="section-title">System Avatar</div>
            <input type="file" id="profile_pic" class="form-control" accept="image/*" required>

            <button type="submit" class="btn btn-submit">REGISTER NODE</button>
        </form>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fileInput = document.getElementById('profile_pic');
            const reader = new FileReader();
            reader.onload = function(event) {
                const userAccount = {
                    username: document.getElementById('username: ').value,
                    password: document.getElementById('password: ').value,
                    fullname: document.getElementById('fullname: ').value,
                    age: document.getElementById('age: ').value,
                    dob: document.getElementById('dob: ').value,
                    pob: document.getElementById('pob: ').value,
                    sex: document.getElementById('sex: ').value,
                    civilStatus: document.getElementById('civilStatus: ').value,
                    address: document.getElementById('address: ').value,
                    phone: document.getElementById('phone: ').value,
                    email: document.getElementById('email: ').value,
                    elem: document.getElementById('elem: ').value,
                    elemYear: document.getElementById('elemYear: ').value,
                    jhs: document.getElementById('jhs: ').value,
                    jhsYear: document.getElementById('jhsYear: ').value,
                    shs: document.getElementById('shs: ').value,
                    shsYear: document.getElementById('shsYear: ').value,
                    college: document.getElementById('college: ').value,
                    course: document.getElementById('course: ').value,
                    profilePic: event.target.result
                };
                localStorage.setItem('user_' + userAccount.username, JSON.stringify(userAccount));
                alert("Identity Saved Successfully!");
                window.location.href = 'login.html';
            };
            reader.readAsDataURL(fileInput.files[0]);
        });
    </script>
</body>
</html>
