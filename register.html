<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Midnight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px; }
        .dark-card { background: #111111; border: 1px solid #222; border-radius: 16px; padding: 40px; width: 100%; max-width: 600px; position: relative; }
        .dark-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(to right, #a855f7, #38bdf8); border-radius: 16px 16px 0 0; }
        .form-control { background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 10px; padding: 10px 15px; margin-bottom: 15px; }
        .form-control:focus { background: #1a1a1a; border-color: #a855f7; box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15); color: #fff; }
        label { color: #9ca3af; font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; font-weight: 600; margin-bottom: 5px; display: block; }
        .btn-submit { background: #fff; color: #000; border: none; padding: 14px; border-radius: 10px; font-weight: 600; width: 100%; transition: 0.3s; }
        .btn-submit:hover { background: #d1d5db; }
        .auth-link { color: #9ca3af; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="dark-card">
        <h3 class="fw-bold text-white mb-4 text-center">Create Identity</h3>
        <div id="statusMsg" class="alert rounded-3 text-center border-0 small" style="display:none;"></div>
        <form id="registerForm">
            <div class="row">
                <div class="col-md-6">
                    <label>Username</label>
                    <input type="text" id="username" class="form-control" placeholder="User ID" required>
                </div>
                <div class="col-md-6">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Secret Key" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <label>Birthdate</label>
                    <input type="date" id="birthdate" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label>Birthplace</label>
                    <input type="text" id="birthplace" class="form-control" placeholder="City, Country" required>
                </div>
            </div>
            <label>Educational Background</label>
            <input type="text" id="education" class="form-control" placeholder="Degree / Institution / Year" required>
            <label>Current Base Location</label>
            <input type="text" id="address" class="form-control" placeholder="City, Coordinates" required>
            <label>Avatar Upload <span class="text-secondary">(Max 2MB)</span></label>
            <input type="file" id="profile_pic" class="form-control" accept="image/*" required>
            <button type="submit" class="btn btn-submit">REGISTER NODE</button>
            <p class="text-center mt-4 mb-0"><a href="login.html" class="auth-link">Already registered? Initialize Login</a></p>
        </form>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fileInput = document.getElementById('profile_pic');
            const statusMsgDiv = document.getElementById('statusMsg');

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                if (file.size > 2 * 1024 * 1024) {
                    statusMsgDiv.innerHTML = "Error: File size exceeds 2MB limit.";
                    statusMsgDiv.style.display = 'block';
                    return; 
                }

                const reader = new FileReader();
                reader.onload = function(event) {
                    const userAccount = {
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value,
                        birthdate: document.getElementById('birthdate').value,
                        birthplace: document.getElementById('birthplace').value,
                        education: document.getElementById('education').value,
                        address: document.getElementById('address').value,
                        profilePic: event.target.result
                    };
                    localStorage.setItem('user_' + userAccount.username, JSON.stringify(userAccount));
                    statusMsgDiv.innerHTML = "Node created. <a href='login.html'>Login here</a>";
                    statusMsgDiv.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
