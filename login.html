<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Midnight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px; }
        .dark-card { background: #111111; border: 1px solid #222; border-radius: 16px; padding: 50px 40px; width: 100%; max-width: 420px; position: relative; }
        .dark-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(to right, #38bdf8, #a855f7); border-radius: 16px 16px 0 0; }
        .form-control { background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 10px; padding: 12px 15px; }
        label { color: #9ca3af; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .btn-submit { background: #fff; color: #000; border: none; padding: 14px; border-radius: 10px; font-weight: 600; width: 100%; transition: 0.3s; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="dark-card">
        <h3 class="fw-bold text-white mb-4">Sign In</h3>
        <form id="loginForm">
            <div class="mb-3"><label>Username</label><input type="text" id="username" class="form-control" required></div>
            <div class="mb-3"><label>Password</label><input type="password" id="password" class="form-control" required></div>
            <button type="submit" class="btn btn-submit">ACCESS SYSTEM</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const savedData = localStorage.getItem('user_' + username);
            if (savedData) {
                const user = JSON.parse(savedData);
                if (user.password === password) {
                    sessionStorage.setItem('loggedInUser', username);
                    window.location.href = 'dashboard.html';
                } else { alert("Incorrect Credentials."); }
            } else { alert("Node not found."); }
        });
    </script>
</body>
</html>
