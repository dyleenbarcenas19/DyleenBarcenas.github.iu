<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Midnight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .dark-card { background: #111111; border: 1px solid #222; border-radius: 16px; padding: 50px 40px; width: 100%; max-width: 420px; position: relative; }
        .dark-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(to right, #38bdf8, #a855f7); border-radius: 16px 16px 0 0; }
        .form-control { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; margin-bottom: 20px; }
        label { color: #9ca3af; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .btn-submit { background: #fff; color: #000; border: none; padding: 14px; border-radius: 10px; font-weight: 600; width: 100%; }
    </style>
</head>
<body>
    <div class="dark-card">
        <h3 class="text-white fw-bold mb-4">Sign In</h3>
        <div id="errorMsg" class="alert alert-danger d-none p-2 text-center small border-0 bg-danger text-white"></div>
        <form id="loginForm">
            <label>Username</label>
            <input type="text" id="username" class="form-control" required>
            <label>Password</label>
            <input type="password" id="password" class="form-control" required>
            <button type="submit" class="btn btn-submit">ACCESS SYSTEM</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const savedData = localStorage.getItem('user_' + username);

            if (savedData) {
                const user = JSON.parse(savedData);
                if (user.password === password) {
                    sessionStorage.setItem('loggedInUser', username);
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('errorMsg').innerText = "Incorrect password.";
                    document.getElementById('errorMsg').classList.remove('d-none');
                }
            } else {
                document.getElementById('errorMsg').innerText = "Account not found.";
                document.getElementById('errorMsg').classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
