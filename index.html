<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Midnight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #ffffff; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; overflow: hidden; position: relative; }
        .glow-circle-1 { position: absolute; top: -10%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(56,189,248,0.15) 0%, rgba(0,0,0,0) 70%); border-radius: 50%; z-index: -1; }
        .glow-circle-2 { position: absolute; bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(168,85,247,0.15) 0%, rgba(0,0,0,0) 70%); border-radius: 50%; z-index: -1; }
        .hero-container { text-align: center; z-index: 10; padding: 2rem; }
        .title { font-size: 4rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 1rem; background: linear-gradient(to right, #38bdf8, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #9ca3af; font-size: 1.2rem; margin-bottom: 3rem; max-width: 500px; margin-left: auto; margin-right: auto; }
        .btn-neon { background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); padding: 14px 35px; border-radius: 30px; font-weight: 600; text-decoration: none; transition: all 0.3s ease; display: inline-block; margin: 10px; backdrop-filter: blur(10px); }
        .btn-neon:hover { border-color: #38bdf8; box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); transform: translateY(-3px); color: white; }
        .btn-neon-purple:hover { border-color: #a855f7; box-shadow: 0 0 20px rgba(168, 85, 247, 0.4); }
    </style>
</head>
<body>
    <div class="glow-circle-1"></div>
    <div class="glow-circle-2"></div>
    <div class="hero-container">
        <h1 class="title">System Access</h1>
        <p class="subtitle">Secure, local-first authentication for your encrypted identity node.</p>
        <div>
            <a href="login.html" class="btn-neon">Initialize Login</a>
            <a href="register.html" class="btn-neon btn-neon-purple">Register Node</a>
        </div>
    </div>
</body>
</html>
